<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seu ingresso — Creden</title>
<link rel="stylesheet" href="creden.css">
<style>
  body{background:var(--secondary);display:grid;place-items:center;min-height:100vh;padding:24px}
  .ticket{width:min(380px,94vw);background:var(--surface);border-radius:24px;overflow:hidden;box-shadow:var(--sh-lift)}
  .t-head{background:var(--primary);color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
  .t-head .brand{color:#fff;font-size:18px}
  .t-status{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--success-bg);color:var(--success);font-weight:700;font-size:14px;padding:10px}
  .t-qr{padding:30px 24px 16px;text-align:center}
  .qr{width:210px;height:210px;margin:0 auto;border-radius:16px;border:1px solid var(--line);padding:12px;background:#fff}
  .t-info{padding:8px 28px 4px;text-align:center}
  .t-info h1{font-size:24px}
  .t-info .who{color:var(--muted);font-size:15px;margin-top:4px}
  .t-rip{position:relative;height:28px;margin:14px 0}
  .t-rip::before,.t-rip::after{content:'';position:absolute;top:50%;width:28px;height:28px;border-radius:50%;background:var(--secondary);transform:translateY(-50%)}
  .t-rip::before{left:-14px}.t-rip::after{right:-14px}
  .t-rip .dash{position:absolute;top:50%;left:18px;right:18px;border-top:2px dashed var(--line)}
  .t-details{padding:4px 28px 8px}
  .drow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
  .drow:last-child{border:none}
  .drow .k{color:var(--muted)}
  .drow .v{font-weight:600;text-align:right}
  .t-foot{background:var(--st-inscrito-bg);color:var(--primary);text-align:center;font-weight:600;font-size:14px;padding:16px}
  .actions{display:flex;gap:10px;justify-content:center;margin-top:18px}
  .actions .btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
</style>
</head>
<body>
<div>
  <div class="ticket">
    <div class="t-head">
      <div class="brand"><span class="dot" style="background:var(--accent);color:var(--secondary)">🎟</span> Creden</div>
      <span style="font-size:12px;opacity:.85">INGRESSO #C-4F9A2</span>
    </div>

    <div class="t-status">● Válido</div>

    <div class="t-qr">
      <!-- QR estilizado (mockup) -->
      <svg class="qr" viewBox="0 0 100 100" aria-label="QR code do ingresso">
        <rect width="100" height="100" fill="#fff"/>
        <g fill="#16302E">
          <path d="M6 6h22v22H6zM10 10v14h14V10z M14 14h6v6h-6z"/>
          <path d="M72 6h22v22H72zM76 10v14h14V10z M80 14h6v6h-6z"/>
          <path d="M6 72h22v22H6zM10 76v14h14V76z M14 80h6v6h-6z"/>
          <rect x="34" y="8" width="4" height="4"/><rect x="42" y="8" width="4" height="4"/><rect x="50" y="8" width="4" height="4"/><rect x="60" y="8" width="4" height="4"/>
          <rect x="34" y="16" width="4" height="4"/><rect x="44" y="16" width="4" height="4"/><rect x="56" y="16" width="4" height="4"/>
          <rect x="36" y="24" width="4" height="4"/><rect x="48" y="24" width="4" height="4"/><rect x="64" y="24" width="4" height="4"/>
          <rect x="8" y="34" width="4" height="4"/><rect x="18" y="34" width="4" height="4"/><rect x="30" y="34" width="4" height="4"/><rect x="42" y="34" width="4" height="4"/><rect x="54" y="34" width="4" height="4"/><rect x="66" y="34" width="4" height="4"/><rect x="78" y="34" width="4" height="4"/><rect x="88" y="34" width="4" height="4"/>
          <rect x="12" y="42" width="4" height="4"/><rect x="24" y="42" width="4" height="4"/><rect x="38" y="42" width="4" height="4"/><rect x="50" y="42" width="4" height="4"/><rect x="62" y="42" width="4" height="4"/><rect x="74" y="42" width="4" height="4"/><rect x="84" y="42" width="4" height="4"/>
          <rect x="8" y="50" width="4" height="4"/><rect x="20" y="50" width="4" height="4"/><rect x="34" y="50" width="4" height="4"/><rect x="46" y="50" width="4" height="4"/><rect x="58" y="50" width="4" height="4"/><rect x="70" y="50" width="4" height="4"/><rect x="82" y="50" width="4" height="4"/><rect x="90" y="50" width="4" height="4"/>
          <rect x="14" y="58" width="4" height="4"/><rect x="26" y="58" width="4" height="4"/><rect x="40" y="58" width="4" height="4"/><rect x="52" y="58" width="4" height="4"/><rect x="64" y="58" width="4" height="4"/><rect x="76" y="58" width="4" height="4"/><rect x="88" y="58" width="4" height="4"/>
          <rect x="36" y="68" width="4" height="4"/><rect x="46" y="68" width="4" height="4"/><rect x="58" y="68" width="4" height="4"/><rect x="68" y="68" width="4" height="4"/><rect x="80" y="68" width="4" height="4"/><rect x="90" y="68" width="4" height="4"/>
          <rect x="34" y="76" width="4" height="4"/><rect x="44" y="76" width="4" height="4"/><rect x="56" y="76" width="4" height="4"/><rect x="70" y="76" width="4" height="4"/><rect x="84" y="76" width="4" height="4"/>
          <rect x="38" y="86" width="4" height="4"/><rect x="50" y="86" width="4" height="4"/><rect x="62" y="86" width="4" height="4"/><rect x="74" y="86" width="4" height="4"/><rect x="88" y="86" width="4" height="4"/>
        </g>
      </svg>
    </div>

    <div class="t-info">
      <h1>Workshop de Cerâmica</h1>
      <div class="who">Marina Alves</div>
    </div>

    <div class="t-rip"><div class="dash"></div></div>

    <div class="t-details">
      <div class="drow"><span class="k">Data</span><span class="v">18 jun 2026 · 14h</span></div>
      <div class="drow"><span class="k">Local</span><span class="v">Ateliê Barro Fino</span></div>
      <div class="drow"><span class="k">Participante</span><span class="v">Marina Alves</span></div>
    </div>

    <div class="t-foot">📲 Apresente esta tela na entrada</div>
  </div>

  <div class="actions">
    <button class="btn">⬇ Salvar</button>
    <button class="btn">✉ Reenviar e-mail</button>
  </div>
</div>
</body>
</html>
