<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Creden — Check-in</title>
<link rel="stylesheet" href="creden.css">
<style>
  body{background:var(--secondary)}
  .ck{min-height:100vh;display:flex;flex-direction:column;color:#fff}
  .ck-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(0,0,0,.25)}
  .ck-top .brand{color:#fff;font-size:17px}
  .counter{text-align:right;line-height:1.1}
  .counter b{font-family:var(--display);font-size:22px}
  .stage{flex:1;display:grid;grid-template-columns:1fr;place-items:center;padding:18px;position:relative}
  .camera{width:min(560px,92vw);aspect-ratio:3/4;max-height:62vh;border-radius:24px;background:radial-gradient(circle at 50% 40%,#23433f,#0c1f1d);position:relative;overflow:hidden;display:grid;place-items:center}
  .reticle{width:62%;aspect-ratio:1;border-radius:20px;position:relative}
  .reticle::before,.reticle::after{content:'';position:absolute;width:38px;height:38px;border:4px solid var(--accent);border-radius:6px}
  .reticle::before{top:0;left:0;border-right:none;border-bottom:none}
  .reticle::after{bottom:0;right:0;border-left:none;border-top:none}
  .corner2{position:absolute;width:38px;height:38px;border:4px solid var(--accent);border-radius:6px}
  .corner2.tr{top:0;right:0;border-left:none;border-bottom:none}
  .corner2.bl{bottom:0;left:0;border-right:none;border-top:none}
  .scanline{position:absolute;left:8%;right:8%;height:3px;background:var(--accent);box-shadow:0 0 12px var(--accent);top:18%;animation:scan 2.4s ease-in-out infinite}
  @keyframes scan{0%,100%{top:16%}50%{top:80%}}
  .hint-cam{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:13px;color:rgba(255,255,255,.7)}
  /* Feedback overlay */
  .feedback{position:absolute;inset:18px;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .fb-icon{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;font-size:52px;margin-bottom:18px;background:rgba(255,255,255,.18)}
  .fb-msg{font-family:var(--display);font-weight:700;font-size:34px;line-height:1.1}
  .fb-name{font-size:20px;margin-top:8px;opacity:.95}
  .fb-success{background:var(--success)}
  .fb-error{background:var(--error)}
  .fb-warning{background:var(--warning);color:var(--secondary)}
  .ck-bottom{padding:16px 18px 26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;background:rgba(0,0,0,.2)}
  .examples{display:flex;gap:12px;justify-content:center;margin:6px 18px 0;flex-wrap:wrap}
  .examples .tag2{font-size:11px;color:rgba(255,255,255,.5)}
  .btn-light{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
  .btn-light:hover{background:rgba(255,255,255,.24)}
</style>
</head>
<body>
<div class="ck">
  <div class="ck-top">
    <div class="brand"><span class="dot" style="background:var(--primary-light)">🎟</span> Workshop de Cerâmica</div>
    <div class="counter"><b>89</b> / 142<br><span style="font-size:12px;opacity:.7">entradas confirmadas</span></div>
  </div>

  <div class="stage">
    <div class="camera">
      <div class="reticle">
        <span class="corner2 tr"></span><span class="corner2 bl"></span>
      </div>
      <div class="scanline"></div>
      <div class="hint-cam">Aponte a câmera para o QR code do ingresso</div>

      <!-- Estado ativo: SUCESSO (troque a classe e o conteúdo para ver os outros estados abaixo) -->
      <div class="feedback fb-success">
        <div class="fb-icon">✓</div>
        <div class="fb-msg">Entrada confirmada</div>
        <div class="fb-name">Marina Alves</div>
      </div>
    </div>
  </div>

  <div class="examples">
    <span class="tag2">Estados de feedback (este mockup mostra o verde acima) ↓ exemplos:</span>
  </div>
  <div class="examples" style="margin-bottom:8px">
    <span class="badge" style="background:var(--success);color:#fff">✓ Entrada confirmada — Nome</span>
    <span class="badge" style="background:var(--error);color:#fff">✕ QR inválido</span>
    <span class="badge" style="background:var(--warning);color:var(--secondary)">! Já entrou às 14:32</span>
  </div>

  <div class="ck-bottom">
    <button class="btn btn-light">🔎 Buscar por nome</button>
    <a class="btn btn-light" href="3-inscritos.html">Encerrar check-in</a>
  </div>
</div>
</body>
</html>
